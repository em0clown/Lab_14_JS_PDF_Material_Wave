<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резюме | Редактор</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }
        .resume-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }
        .resume-header { background: #1a1a2e; color: white; padding: 40px; text-align: center; }
        .resume-content { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; padding: 40px; }
        .sidebar { background: #f8f9fa; padding: 20px; border-radius: 15px; }
        .section { margin-bottom: 25px; position: relative; }
        .section-title { font-size: 1.2em; font-weight: bold; border-left: 4px solid #667eea; padding-left: 10px; margin-bottom: 15px; }
        
        .skill-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill-item { 
            background: #667eea; color: white; padding: 5px 12px; 
            border-radius: 20px; font-size: 0.9em; display: flex; align-items: center; gap: 5px; 
        }
        
        .remove-item {
            cursor: pointer;
            width: 16px; height: 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 10px;
        }
        .remove-item:hover { background: rgba(255,0,0,0.6); }

        .no-print { transition: opacity 0.2s; }
        
        .action-buttons { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #eee; }
        button { cursor: pointer; border: none; border-radius: 25px; padding: 10px 20px; font-weight: bold; }
        .download-btn { background: #667eea; color: white; }
        .reset-btn { background: #f56565; color: white; }

        [contenteditable="true"]:focus { background: rgba(102, 126, 234, 0.05); outline: none; border-radius: 4px; }

        @media (max-width: 768px) { .resume-content { grid-template-columns: 1fr; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="resume-container" id="resume">
    <div class="resume-header">
        <h1 contenteditable="true" id="name">Иван Петров</h1>
        <div contenteditable="true" id="position">Frontend-разработчик</div>
        <div class="contacts">
            <span contenteditable="true" id="email">ivan@example.com</span> | 
            <span contenteditable="true" id="phone">+7 (999) 000-00-00</span>
        </div>
    </div>

    <div class="resume-content">
        <div class="sidebar">
            <div class="section">
                <div class="section-title">Навыки 
                    <button class="no-print ctrl-btn-add" data-type="skills">＋</button>
                </div>
                <div class="skill-list" id="skillsList">
                    <div class="skill-item" contenteditable="true">JavaScript <span class="remove-item">✕</span></div>
                    <div class="skill-item" contenteditable="true">React <span class="remove-item">✕</span></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Языки
                    <button class="no-print ctrl-btn-add" data-type="languages">＋</button>
                </div>
                <div class="skill-list" id="languagesList">
                    <div class="skill-item" contenteditable="true">Русский <span class="remove-item">✕</span></div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-title">Опыт работы</div>
                <div id="experience">
                    <div class="job-item" style="margin-bottom: 15px;">
                        <b contenteditable="true">Старший разработчик</b>
                        <div contenteditable="true" style="color: #667eea; font-size: 0.9em;">2024 — н.в.</div>
                        <div contenteditable="true">Описание ваших достижений и обязанностей...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="action-buttons no-print">
        <button class="reset-btn" id="resetBtn">Сбросить</button>
        <button class="download-btn" id="downloadBtn">Скачать PDF</button>
    </div>
</div>

<script>
    const resume = document.getElementById('resume');
    const skillsList = document.getElementById('skillsList');
    const languagesList = document.getElementById('languagesList');

    resume.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-item')) {
            e.target.closest('.skill-item, .contact-line')?.remove();
            saveState();
        }
    });

    document.querySelectorAll('.ctrl-btn-add').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.type;
            const container = type === 'skills' ? skillsList : languagesList;
            const newItem = document.createElement('div');
            newItem.className = 'skill-item';
            newItem.contentEditable = true;
            newItem.innerHTML = `Новый элемент <span class="remove-item">✕</span>`;
            container.appendChild(newItem);
            saveState();
        });
    });

    function saveState() {
        const data = {
            name: document.getElementById('name').innerHTML,
            position: document.getElementById('position').innerHTML,
            skills: skillsList.innerHTML,
            languages: languagesList.innerHTML,
            experience: document.getElementById('experience').innerHTML
        };
        localStorage.setItem('resume_data', JSON.stringify(data));
    }

    resume.addEventListener('input', () => saveState());

    function loadState() {
        const saved = localStorage.getItem('resume_data');
        if (!saved) return;
        const data = JSON.parse(saved);
        document.getElementById('name').innerHTML = data.name;
        document.getElementById('position').innerHTML = data.position;
        skillsList.innerHTML = data.skills;
        languagesList.innerHTML = data.languages;
        document.getElementById('experience').innerHTML = data.experience;
    }

    async function downloadPDF() {
        const element = document.getElementById('resume');
        
        const noPrintElements = document.querySelectorAll('.no-print');
        noPrintElements.forEach(el => el.style.display = 'none');
        const removeIcons = document.querySelectorAll('.remove-item');
        removeIcons.forEach(el => el.style.visibility = 'hidden');

        const opt = {
            margin: 10,
            filename: 'my_resume.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } finally {
            noPrintElements.forEach(el => el.style.display = '');
            removeIcons.forEach(el => el.style.visibility = 'visible');
        }
    }

    document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
    document.getElementById('resetBtn').addEventListener('click', () => {
        if(confirm('Сбросить все данные?')) {
            localStorage.removeItem('resume_data');
            location.reload();
        }
    });

    window.onload = loadState;
</script>
</body>
</html>
